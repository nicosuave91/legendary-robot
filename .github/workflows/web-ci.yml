name: web-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm install

      - name: Typecheck
        run: npm run --workspace apps/web typecheck

      - name: Unit tests
        run: npm run --workspace apps/web test

      - name: Build
        run: npm run --workspace apps/web build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Browser smoke tests
        run: npm run --workspace apps/web test:e2e
