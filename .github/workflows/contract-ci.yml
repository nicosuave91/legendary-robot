name: contract-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Publish OpenAPI artifact
        run: php apps/api/scripts/publish-openapi.php

      - name: Generate frontend client
        run: node scripts/generate-web-client.mjs

      - name: Verify workflow contract closure
        run: node scripts/verify-workflow-contract-closure.mjs

      - name: Verify no handwritten API drift
        run: node scripts/verify-no-handwritten-api.mjs

      - name: Fail on generated diff
        run: git diff --exit-code
