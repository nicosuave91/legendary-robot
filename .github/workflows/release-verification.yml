web-validation:
  runs-on: ubuntu-latest
  defaults:
    run:
      working-directory: .
  steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install frontend dependencies
      run: npm ci

    - name: Publish and generate contracts
      run: npm run contracts:sync

    - name: Verify communications contract sync
      run: npm run verify:communications:contract-sync

    - name: Guard handwritten API usage
      run: npm run guard:no-handwritten-api

    - name: Typecheck
      run: npm --workspace apps/web run typecheck

    - name: Run Vitest
      run: npm --workspace apps/web run test

    - name: Build frontend
      run: npm --workspace apps/web run build
