name: Release Verification

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  api-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Prepare API environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          {
            echo ""
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=${GITHUB_WORKSPACE}/apps/api/database/database.sqlite"
            echo "CACHE_STORE=array"
            echo "SESSION_DRIVER=file"
            echo "SESSION_DOMAIN=127.0.0.1"
            echo "SANCTUM_STATEFUL_DOMAINS=127.0.0.1:5173,localhost:5173,127.0.0.1,localhost"
            echo "CORS_ALLOWED_ORIGINS=http://127.0.0.1:5173"
          } >> .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate application key
        run: php artisan key:generate --force

      - name: Run migrations and seed
        run: php artisan migrate:fresh --seed --force

      - name: Publish OpenAPI artifact
        run: composer run contracts:publish

      - name: Run PHPUnit
        run: composer test

      - name: Run Larastan
        run: ./vendor/bin/phpstan analyse

  web-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run Vitest
        run: npm run test

      - name: Build frontend
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [api-validation, web-validation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Prepare API environment
        working-directory: apps/api
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          {
            echo ""
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=${GITHUB_WORKSPACE}/apps/api/database/database.sqlite"
            echo "CACHE_STORE=array"
            echo "SESSION_DRIVER=file"
            echo "SESSION_DOMAIN=127.0.0.1"
            echo "SANCTUM_STATEFUL_DOMAINS=127.0.0.1:5173,localhost:5173,127.0.0.1,localhost"
            echo "CORS_ALLOWED_ORIGINS=http://127.0.0.1:5173"
          } >> .env

      - name: Install API dependencies
        working-directory: apps/api
        run: composer install --no-interaction --prefer-dist

      - name: Bootstrap API
        working-directory: apps/api
        run: |
          php artisan key:generate --force
          php artisan migrate:fresh --seed --force

      - name: Start API server
        working-directory: apps/api
        run: php artisan serve --host=127.0.0.1 --port=8000 > /tmp/snowball-api.log 2>&1 &

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run release smoke journeys
        working-directory: apps/web
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test e2e/release-critical-journeys.spec.ts
